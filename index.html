<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Knowledge Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🤖 AI Knowledge Hub</h1>
        <button id="themeToggle">🌙</button>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message bot">Click the button to learn something cool about AI!</div>
    </div>

    <div class="controls">
        <button id="factBtn">Generate Fact</button>
    </div>

    <audio id="clickSound" src="sounds/click.mp3"></audio>

    <script src="script.js"></script>
</body>

</html>
